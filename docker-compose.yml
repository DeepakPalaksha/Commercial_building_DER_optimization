services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./outputs:/app/outputs
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  dash:
    build: .
    command: >
      uv run streamlit run streamlit_app/app.py
      --server.port 8501
      --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
    env_file:
      - path: .env
        required: false
    depends_on:
      api:
        condition: service_healthy
